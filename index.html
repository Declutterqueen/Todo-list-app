<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 Advanced To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="app">
      <h1>📝 Advanced To-Do List</h1>
      <div class="input-group">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button id="addBtn">Add Task</button>
      </div>
      
      <div class="task-filters">
        <button class="filter-btn active" data-filter="all">All (0)</button>
        <button class="filter-btn" data-filter="pending">Pending (0)</button>
        <button class="filter-btn" data-filter="done">Completed (0)</button>
      </div>

      <ul id="taskList"></ul>
    </div>

    <button id="darkModeToggle">🌓 Toggle Dark Mode</button>

    <div class="status-card">
      <p id="taskCount">Tasks: 0</p>
      <p id="emptyMessage">Your task list is empty 📭</p>
    </div>
  </main>

  <footer>
    <p>Created by <a href="https://github.com/Declutterqueen/Declutter-portfolio" target="_blank">Mehreen</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
